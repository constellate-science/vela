# Primary fly.io config for the public hub (vela-hub.fly.dev).
# Deploy from the repo root, as documented in docs/HUB.md:
#   flyctl deploy --config crates/vela-hub/fly.toml
# Secondary hubs: fly.hub-2.toml (sjc), fly.hub-eu.toml (ams).

app = "vela-hub"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine always warm: the hub is the trust substrate / verifier
  # endpoint, so a cold-start tax on the first request after idle is
  # unacceptable. The second machine still scales to zero.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  # Self-healing: poll /healthz so Fly routes traffic away from a wedged
  # machine to the healthy one and restarts the bad one automatically. Without
  # this, a single overloaded machine (e.g. a heavy build hammering Neon) took
  # the whole hub down until a manual restart. grace_period gives a fresh
  # machine time to warm before the first probe.
  [[http_service.checks]]
    interval = "15s"
    timeout = "8s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
