# Primary fly.io config for the public hub (vela-hub.fly.dev).
# Deploy from the repo root, as documented in docs/HUB.md:
#   flyctl deploy --config crates/vela-hub/fly.toml
# Secondary hubs: fly.hub-2.toml (sjc), fly.hub-eu.toml (ams).

app = "vela-hub"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
