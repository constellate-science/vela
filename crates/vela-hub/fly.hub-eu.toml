# v0.228: secondary fly.io hub config pinned to an EU region so the
# multi-hub witness-check (v0.216) runs against geographically
# diverse infrastructure. A reviewer or auditor checking pack
# byte-equivalence across hubs has two physically separated
# endpoints to query.
#
# Deploy:
#   fly launch --config crates/vela-hub/fly.hub-eu.toml --copy-config \
#     --name vela-hub-eu --region ams
#   fly deploy --config crates/vela-hub/fly.hub-eu.toml
#
# Witness-check:
#   vela diff-pack witness-check --pack-id vsd_... \
#     --hubs https://vela-hub.fly.dev,https://vela-hub-eu.fly.dev

app = "vela-hub-eu"
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  RUST_LOG = 'vela_hub=info,tower_http=info'
  VELA_HUB_PORT = '8080'
  # Operator note: VELA_HUB_REGION is informational only; the hub
  # behaviour is identical across regions. The substrate's witness-
  # check compares pack byte-identity across endpoints; the region
  # tag just makes operator-side logs easier to read.
  VELA_HUB_REGION = 'eu'

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/healthz'

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/readyz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
