# Supply-chain hardening for Vela releases (build-borrow A3 / memo section 10).
# Borrows SLSA + Sigstore to harden the BINARY and verifier builds, never the
# scientific log (that stays the offline RFC-6962 Merkle log). On a tagged
# release, build the vela binary, attest its build provenance (SLSA, recorded in
# the Sigstore transparency log), and attach it to the release. Verifiers and
# users can then `gh attestation verify` the binary before trusting it.
name: release-provenance

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write        # OIDC for keyless Sigstore signing
  attestations: write    # GitHub artifact attestations

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release -p vela-cli
      - name: Attest build provenance (SLSA + Sigstore)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: target/release/vela
      - name: Attach binary to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" target/release/vela --clobber
